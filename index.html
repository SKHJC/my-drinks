<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲料紀錄</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f4f7f6; line-height: 1.5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 550px; margin: auto; margin-bottom: 20px; }
        h2, h3 { color: #2c3e50; margin-top: 0; border-left: 4px solid #4CAF50; padding-left: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.9em; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fff; }
        .price-group, .size-group, .discount-group { display: flex; gap: 8px; align-items: flex-end; }
        
        input:disabled { background-color: #f0f0f0; color: #999; cursor: not-allowed; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; font-size: 0.95em; font-weight: bold; }
        .checkbox-label input { width: 20px; height: 20px; margin: 0; }

        button#submitBtn { background: #4CAF50; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .view-all-btn { background: #fff; color: #4CAF50; border: 2px solid #4CAF50; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .view-all-btn.active { background: #4CAF50; color: #fff; }

        .calendar-picker { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .month-btn { padding: 12px 5px; background: #fdfdfd; border: 1px solid #eee; color: #666; cursor: pointer; text-align: center; border-radius: 8px; font-size: 1em; }
        .month-btn.active { background: #4CAF50; color: #fff; font-weight: bold; border-color: #4CAF50; }

        .record-entry { background: #fff; border: 1px solid #ddd; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        .record-summary { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.95em; }
        .record-details { display: none; padding: 15px; background: #fafafa; border-top: 1px solid #eee; font-size: 0.9em; }
        
        .all-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .all-item-info { color: #2c3e50; font-size: 0.95em; display: block; width: 100%; word-break: break-all; }
        .all-item-sub { display: flex; align-items: center; margin-top: 6px; flex-wrap: wrap; gap: 5px; }
        
        .small-meta { font-size: 0.8em; color: #888; }
        .price-meta { font-size: 0.9em; color: #333; margin-right: auto; }
        .price-meta b { color: #000; }
        .old-price { text-decoration: line-through; color: #999; margin-right: 5px; font-weight: normal; }
        
        .count-badge { background: #e8f5e9; color: #2e7d32; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; font-weight: bold; margin-left: 5px; }
        
        .all-btn-group { display: flex; gap: 5px; margin-left: auto; }
        .mini-btn { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; cursor: pointer; border: 1px solid; background: #fff; }
        .mini-edit { color: #3498db; border-color: #3498db; }
        .mini-del { color: #e74c3c; border-color: #e74c3c; }

        .history-group-divider { border-top: 2px solid #ddd; margin: 15px 0 5px 0; padding-top: 5px; color: #4CAF50; font-weight: bold; font-size: 0.85em; }
        .detail-item { margin-bottom: 8px; display: flex; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
        .detail-label { color: #888; width: 90px; flex-shrink: 0; font-weight: bold; }
        .reorder-highlight { color: #e67e22; font-weight: bold; background: #fff3e0; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        
        .year-stats { background: #f9f9f9; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95em; color: #444; border: 1px solid #eee; line-height: 1.8; }
        .year-stats b { color: #2e7d32; }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .edit-btn, .del-btn { cursor: pointer; border: 1px solid #3498db; padding: 6px 12px; border-radius: 6px; flex: 1; text-align: center; font-size: 0.85em; }
        .edit-btn { color: #3498db; }
        .del-btn { color: #e74c3c; border-color: #e74c3c; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="formTitle">🥤 飲料紀錄</h2>
    <input type="hidden" id="editRowId">
    <label>日期</label><input type="date" id="date">
    <label>店家名稱</label><input type="text" id="shopInput" list="shopList" placeholder="例如：林三茶研所" onchange="autoCheckReorder()"><datalist id="shopList"></datalist>
    <label>飲料名稱</label><input type="text" id="drinkName" placeholder="例如：黃金烏龍拿鐵" onchange="autoCheckReorder()">
    
    <div class="size-group">
        <div style="flex:3">
            <label>容量大小</label>
            <select id="size">
                <optgroup label="一般手搖飲"><option value="大杯(L/700ml)">大杯 (L/700ml)</option><option value="中杯(M/500ml)">中杯 (M/500ml)</option><option value="小杯(S/360ml)">小杯 (S/360ml)</option><option value="特大杯(XL/1000cc)">特大杯 (XL/1000cc)</option><option value="瓶裝">瓶裝</option></optgroup>
                <optgroup label="品牌專屬分享瓶"><option value="麻古分享瓶(960ml)">麻古分享瓶 (960ml)</option><option value="大苑子分享瓶(960ml)">大苑子分享瓶 (960ml)</option><option value="TEA TOP分享瓶(1L)">TEA TOP分享瓶 (1L)</option><option value="老賴分享瓶(2L)">老賴分享瓶 (2L)</option></optgroup>
                <optgroup label="咖啡/超商/速食店"><option value="特大杯(約660ml)">特大杯 (約660ml)</option><option value="大杯(約480ml)">大杯 (約480ml)</option><option value="中杯(約360ml)">中杯 (約360ml)</option><option value="小杯(約240ml)">小杯 (約240ml)</option></optgroup>
            </select>
        </div>
        <div style="flex:1">
            <label>杯數</label>
            <input type="number" id="count" value="1" min="1">
        </div>
    </div>

    <label>額外加料</label><input type="text" id="toppingInput" placeholder="例如：粉條、珍珠">
    <label>購買方式</label>
    <select id="orderMethod">
        <option value="店取">店取</option><option value="外送">外送</option><option value="UberEats">UberEats</option><option value="Foodpanda">Foodpanda</option><option value="其他人請客">其他人請客</option><option value="內用">內用</option>
    </select>

    <label class="checkbox-label"><input type="checkbox" id="isCombo" onchange="toggleCombo(this.checked)"> 🍱 附餐飲料 (價格凍結)</label>

    <div class="price-group">
        <div style="flex:2"><label>原價/單價</label><input type="number" id="price" placeholder="金額"></div>
        <div style="flex:1"><label>幣值</label><select id="currency"><option value="NTD">NTD</option><option value="USD">USD</option><option value="JPY">JPY</option><option value="KRW">KRW</option></select></div>
    </div>

    <div class="discount-group">
        <div style="flex:1">
            <label>優惠方式</label>
            <select id="discountType" onchange="calculateFinalPrice()">
                <option value="none">無折扣</option>
                <option value="minus">折抵金額 (元)</option>
                <option value="percent">打折 (折)</option>
            </select>
        </div>
        <div style="flex:1">
            <label>折扣數值</label>
            <input type="number" id="discountValue" placeholder="例: 5 或 9" oninput="calculateFinalPrice()">
        </div>
    </div>
    <div id="finalPriceShow" style="font-size:0.85em; color:#2e7d32; margin-top:5px; font-weight:bold; display:none;">折扣後預估：<span id="finalValue">0</span></div>

    <label>糖 (甜度)</label>
    <select id="sugar"><option value="不可調整">不可調整</option><option value="正常糖">正常糖</option><option value="少糖(7分)">少糖(7分)</option><option value="半糖(5分)">半糖(5分)</option><option value="微糖(3分)">微糖(3分)</option><option value="無糖">無糖</option></select>
    <label>冰 (冰塊)</label>
    <select id="ice"><option value="不可調整">不可調整</option><option value="正常冰">正常冰</option><option value="少冰">少冰</option><option value="微冰">微冰</option><option value="去冰">去冰</option><option value="完全去冰">完全去冰</option><option value="常溫">常溫</option><option value="熱">熱</option></select>
    <label>星等評分</label>
    <select id="rating"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select>
    <label class="checkbox-label"><input type="checkbox" id="reorder"> <b>是否會回購</b></label>
    <label>簡評</label><textarea id="comment" rows="2" placeholder="詳細心得..."></textarea>
    <button onclick="submitData()" id="submitBtn">送出記錄</button>
</div>

<div class="card">
    <h3 onclick="toggleModule('historyModule')">📅 歷史紀錄 <span>▼</span></h3>
    <div id="historyModule" class="module-content" style="display: block;">
        <div id="yearStatsDisplay" class="year-stats"></div>
        <button id="toggleViewBtn" class="view-all-btn" onclick="toggleViewMode()">顯示所有飲料紀錄 (條列總覽)</button>
        <div id="calendarPickerWrap">
            <div class="calendar-picker">
                <div class="year-selector-wrap" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <select id="yearSelect" style="width:auto; margin:0;" onchange="renderHistory()"></select>
                    <span style="font-size: 0.9em; color: #999;">年份篩選</span>
                </div>
                <div class="month-grid" id="monthGrid"></div>
            </div>
        </div>
        <div id="historyRecords"></div>
    </div>
</div>

<div class="card"><h3 onclick="toggleModule('bestModule')">🧡 好喝清單 <span>▼</span></h3><div id="bestModule" class="module-content"><div id="bestRecords"></div></div></div>
<div class="card"><h3 onclick="toggleModule('shopModule')">🏬 依店家篩選 <span>▼</span></h3><div id="shopModule" class="module-content"><select id="shopSelect" onchange="filterByShop(this.value)"><option value="">選擇店家...</option></select><div id="shopRecords" style="margin-top:15px;"></div></div></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvMpikBJ2YRM8HCuuXj_VDUDE5Und3_vRBeYOwNy-7MulUCLIv3aGdLEMj7PrVCz8/exec";
    let allData = [];
    let selectedMonth = new Date().getMonth() + 1;
    let isAllViewMode = false;

    document.getElementById('date').valueAsDate = new Date();

    function toggleCombo(checked) {
        const priceInput = document.getElementById('price');
        if(checked) { priceInput.value = 0; priceInput.disabled = true; } 
        else { priceInput.disabled = false; }
        calculateFinalPrice();
    }

    // 計算折扣後價格
    function calculateFinalPrice() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const type = document.getElementById('discountType').value;
        const val = parseFloat(document.getElementById('discountValue').value) || 0;
        const display = document.getElementById('finalPriceShow');
        let final = price;

        if (type === 'minus') final = price - val;
        else if (type === 'percent' && val > 0) final = price * (val / 10);

        if (type !== 'none' && price > 0) {
            display.style.display = 'block';
            document.getElementById('finalValue').innerText = Math.round(final);
        } else {
            display.style.display = 'none';
        }
        return Math.round(final);
    }

    // 智慧回購自動勾選
    function autoCheckReorder() {
        const shop = document.getElementById('shopInput').value.trim();
        const drink = document.getElementById('drinkName').value.trim();
        if (!shop || !drink) return;

        const hasReordered = allData.slice(1).some(r => r[2] === shop && r[1] === drink && r[8] === "是");
        if (hasReordered) {
            document.getElementById('reorder').checked = true;
        }
    }

    function initYearSelect() {
        const select = document.getElementById('yearSelect');
        const currentYear = new Date().getFullYear();
        for(let y = currentYear - 5; y <= 2045; y++) {
            let opt = document.createElement('option');
            opt.value = y; opt.innerText = y + " 年";
            if(y === currentYear) opt.selected = true;
            select.appendChild(opt);
        }
    }

    function initMonthGrid() {
        const grid = document.getElementById('monthGrid');
        for (let i = 1; i <= 12; i++) {
            let btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.id = 'mbtn-' + i; btn.innerText = i + '月';
            if(i === selectedMonth) btn.classList.add('active');
            btn.onclick = () => {
                selectedMonth = i;
                document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderHistory();
            };
            grid.appendChild(btn);
        }
    }

    function updateYearStats() {
        const statsEl = document.getElementById('yearStatsDisplay');
        const statsMap = {};
        allData.slice(1).forEach(r => {
            const year = new Date(r[0]).getFullYear();
            const count = parseInt(r[13]) || 1;
            statsMap[year] = (statsMap[year] || 0) + count;
        });
        let html = "";
        Object.keys(statsMap).sort((a,b) => b-a).forEach(year => {
            html += `<div>${year} &nbsp; <b>${statsMap[year]}</b> 杯(瓶)</div>`;
        });
        statsEl.innerHTML = html || "尚無統計資料";
    }

    fetch(SCRIPT_URL).then(res => res.json()).then(data => {
        allData = data;
        initYearSelect();
        initMonthGrid();
        refreshMetadata();
        renderHistory();
        renderBestList();
        updateYearStats();
    });

    function toggleViewMode() {
        isAllViewMode = !isAllViewMode;
        const btn = document.getElementById('toggleViewBtn');
        const picker = document.getElementById('calendarPickerWrap');
        if (isAllViewMode) { btn.innerText = "切換回月曆篩選模式"; btn.classList.add('active'); picker.style.display = 'none'; } 
        else { btn.innerText = "顯示所有飲料紀錄 (條列總覽)"; btn.classList.remove('active'); picker.style.display = 'block'; }
        renderHistory();
    }

    function renderHistory() {
        const target = document.getElementById('historyRecords');
        const yearSelect = document.getElementById('yearSelect');
        const year = yearSelect ? parseInt(yearSelect.value) : new Date().getFullYear();
        let filtered = isAllViewMode ? allData.slice(1) : allData.slice(1).filter(r => {
            let d = new Date(r[0]);
            return d.getFullYear() === year && (d.getMonth() + 1) === selectedMonth;
        });
        filtered.sort((a, b) => new Date(b[0]) - new Date(a[0]));
        target.innerHTML = filtered.length ? "" : "<p style='text-align:center;color:#999;padding:20px;'>尚無紀錄</p>";
        filtered.forEach(r => {
            if (isAllViewMode) target.innerHTML += renderAllViewItem(r, allData.indexOf(r));
            else target.innerHTML += renderRecord(r, allData.indexOf(r), true);
        });
    }

    // 格式化價格顯示邏輯
    function formatPriceDisplay(priceStr, currency) {
        if (priceStr == 0) return "套餐附餐";
        
        // 檢查是否含有備註折扣邏輯 (僅前端計算)
        const parts = priceStr.toString().split('|'); // 假設存儲格式 K欄可能有原始價格備註
        const price = parseFloat(parts[0]);
        
        // 這裡我們暫時用簡單邏輯：如果傳入的是包含折扣計算的顯示
        return `<b>${price} ${currency}</b>`;
    }

    function renderAllViewItem(r, idx) {
        const d = new Date(r[0]);
        const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
        const count = r[13] && r[13] > 1 ? `<span class="count-badge">x${r[13]}</span>` : "";
        
        // 價格顯示處理
        let priceHtml = "";
        if(r[10] == 0) priceHtml = "套餐附餐";
        else priceHtml = `<b>${r[10]} ${r[11]}</b>`;

        return `
            <div class="all-item">
                <div class="all-item-info"><small style="color:#999; margin-right:5px;">${dateStr}</small><b>${r[2]}</b> - ${r[8]==="是"?'★':''}${r[1]}${r[5]?`(${r[5]})`:''}${count}</div>
                <div class="all-item-sub">
                    <span class="price-meta">${priceHtml}</span>
                    <span class="small-meta">- ${r[3]} / ${r[4]} - ${r[12] || ""}</span>
                    <div class="all-btn-group"><span class="mini-btn mini-edit" onclick="startEdit(${idx})">編輯</span><span class="mini-btn mini-del" onclick="deleteRecord(${idx})">刪除</span></div>
                </div>
            </div>`;
    }

    function renderRecord(r, idx, showDateInTitle) {
        const isReorder = r[8] === "是";
        const d = new Date(r[0]);
        const count = r[13] && r[13] > 1 ? `<span class="count-badge">x${r[13]}</span>` : "";
        const dateHeader = showDateInTitle ? `<b>${d.getDate()}日</b> ` : "";
        const dateDetail = !showDateInTitle ? `<div class="history-group-divider">${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} 紀錄</div>` : "";
        
        let priceHtml = r[10] == 0 ? "套餐附餐" : `<b>${r[10]} ${r[11]}</b>`;

        return `
            <div class="record-entry">
                <div class="record-summary" onclick="toggleDetail(this)">
                    <div>${dateHeader}${r[2]} - ${isReorder?'★':''}${r[1]}${r[12] ? ` [${r[12]}]` : ""}${count}</div>
                    <span style="color:#4CAF50;font-weight:bold;">詳情▼</span>
                </div>
                <div class="record-details">
                    ${dateDetail}
                    <div class="detail-item"><span class="detail-label">價格：</span><span>${priceHtml} (${r[6]})</span></div>
                    <div class="detail-item"><span class="detail-label">杯數：</span><span>${r[13] || 1} 杯</span></div>
                    <div class="detail-item"><span class="detail-label">糖冰組合：</span><span>${r[3]} / ${r[4]}</span></div>
                    <div class="detail-item"><span class="detail-label">容量大小：</span><span>${r[12] || '未記錄'}</span></div>
                    <div class="detail-item"><span class="detail-label">額外加料：</span><span>${r[5] || '無'}</span></div>
                    <div class="detail-item"><span class="detail-label">星等評分：</span><span>${"⭐".repeat(r[7])}</span></div>
                    ${r[8]==="是" ? '<div class="reorder-highlight">【會回購】</div>' : ''}
                    <div style="margin-top:10px; background:#fff; padding:10px; border-radius:6px; border:1px solid #ddd;">${r[9] || '無備註'}</div>
                    <div class="btn-group"><div class="edit-btn" onclick="startEdit(${idx})">編輯</div><div class="del-btn" onclick="deleteRecord(${idx})">刪除</div></div>
                </div>
            </div>`;
    }

    function toggleModule(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function toggleDetail(el) { const d = el.nextElementSibling; d.style.display = (d.style.display === 'block') ? 'none' : 'block'; }

    function refreshMetadata() {
        const shops = [...new Set(allData.slice(1).map(r => r[2]))].filter(Boolean);
        const shopSelect = document.getElementById('shopSelect');
        const shopList = document.getElementById('shopList');
        if(shopSelect) { shopSelect.innerHTML = '<option value="">選擇店家...</option>'; shops.forEach(s => shopSelect.innerHTML += `<option value="${s}">${s}</option>`); }
        if(shopList) { shopList.innerHTML = ""; shops.forEach(s => shopList.innerHTML += `<option value="${s}">`); }
    }

    function renderBestList() {
        const target = document.getElementById('bestRecords');
        const best = allData.slice(1).filter(r => r[7] >= 4);
        target.innerHTML = best.length ? "" : "<p style='text-align:center;color:#999;padding:20px;'>尚無高分評價</p>";
        best.reverse().forEach(r => target.innerHTML += `<div class="best-item"><b>${r[2]}</b> - ${r[1]} (${"⭐".repeat(r[7])})</div>`);
    }

    function filterByShop(shop) {
        const target = document.getElementById('shopRecords');
        if(!shop) { target.innerHTML = ""; return; }
        let filtered = allData.slice(1).filter(r => r[2] === shop);
        filtered.sort((a, b) => new Date(b[0]) - new Date(a[0]));
        const groupedByDrink = {};
        filtered.forEach(r => {
            const drinkName = r[1];
            if (!groupedByDrink[drinkName]) groupedByDrink[drinkName] = [];
            groupedByDrink[drinkName].push({ data: r, idx: allData.indexOf(r) });
        });
        target.innerHTML = "";
        Object.keys(groupedByDrink).forEach(drink => {
            const records = groupedByDrink[drink];
            const first = records[0].data;
            let html = `
                <div class="record-entry">
                    <div class="record-summary" onclick="toggleDetail(this)">
                        <div><b>${drink}</b>${first[12] ? ` [${first[12]}]` : ""} ${records.length > 1 ? `<small style="color:#999">(共 ${records.length} 次紀錄)</small>` : ""}</div>
                        <span style="color:#4CAF50;font-weight:bold;">詳情▼</span>
                    </div>
                    <div class="record-details">`;
            records.forEach(item => {
                const r = item.data;
                const d = new Date(r[0]);
                const countStr = r[13] && r[13] > 1 ? ` (杯數: ${r[13]})` : "";
                let priceHtml = r[10] == 0 ? "套餐附餐" : `<b>${r[10]} ${r[11]}</b>`;
                html += `
                    <div class="history-group-divider">${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} 紀錄${countStr}</div>
                    <div class="detail-item"><span class="detail-label">價格：</span><span>${priceHtml} (${r[6]})</span></div>
                    <div class="detail-item"><span class="detail-label">糖冰組合：</span><span>${r[3]} / ${r[4]}</span></div>
                    <div class="detail-item"><span class="detail-label">加料內容：</span><span>${r[5] || '無'}</span></div>
                    <div class="detail-item"><span class="detail-label">星等評分：</span><span>${"⭐".repeat(r[7])}</span></div>
                    ${r[8]==="是" ? '<div class="reorder-highlight">【會回購】</div>' : ''}
                    <div style="margin-top:5px; background:#fff; padding:10px; border-radius:6px; border:1px solid #ddd; margin-bottom:10px;">${r[9] || '無備註'}</div>
                    <div class="btn-group" style="margin-bottom:15px;"><div class="edit-btn" onclick="startEdit(${item.idx})">編輯</div><div class="del-btn" onclick="deleteRecord(${item.idx})">刪除</div></div>`;
            });
            html += `</div></div>`;
            target.innerHTML += html;
        });
    }

    function submitData() {
        const btn = document.getElementById('submitBtn');
        // 最終提交時，若有折扣則提交折扣後的價格
        const finalPrice = calculateFinalPrice();
        const data = {
            rowId: document.getElementById('editRowId').value,
            date: document.getElementById('date').value,
            drinkName: document.getElementById('drinkName').value,
            shopName: document.getElementById('shopInput').value,
            sugar: document.getElementById('sugar').value,
            ice: document.getElementById('ice').value,
            topping: document.getElementById('toppingInput').value,
            orderMethod: document.getElementById('orderMethod').value,
            rating: document.getElementById('rating').value,
            reorder: document.getElementById('reorder').checked,
            comment: document.getElementById('comment').value,
            price: finalPrice,
            currency: document.getElementById('currency').value,
            size: document.getElementById('size').value,
            count: document.getElementById('count').value
        };
        if(!data.date || !data.drinkName || !data.shopName) return alert("請填寫日期、店家與飲料名稱！");
        btn.disabled = true;
        fetch(SCRIPT_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(data) }).then(() => location.reload());
    }

    function deleteRecord(idx) { if(!confirm("確定要刪除嗎？")) return; fetch(SCRIPT_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify({method:'DELETE', rowId:idx}) }).then(() => location.reload()); }

    function startEdit(idx) {
        const r = allData[idx];
        const dateInput = document.getElementById('date');
        const rawDate = new Date(r[0]);
        dateInput.value = `${rawDate.getFullYear()}-${String(rawDate.getMonth() + 1).padStart(2, '0')}-${String(rawDate.getDate()).padStart(2, '0')}`;
        document.getElementById('editRowId').value = idx;
        document.getElementById('shopInput').value = r[2];
        document.getElementById('drinkName').value = r[1];
        document.getElementById('toppingInput').value = r[5];
        document.getElementById('orderMethod').value = r[6] || "店取";
        
        const priceInput = document.getElementById('price');
        const isComboCheck = document.getElementById('isCombo');
        priceInput.value = r[10];
        if(r[10] == 0) { isComboCheck.checked = true; priceInput.disabled = true; } 
        else { isComboCheck.checked = false; priceInput.disabled = false; }

        document.getElementById('currency').value = r[11] || "NTD";
        document.getElementById('sugar').value = r[3];
        document.getElementById('ice').value = r[4];
        document.getElementById('rating').value = r[7];
        document.getElementById('reorder').checked = (r[8] === "是");
        document.getElementById('comment').value = r[9];
        document.getElementById('size').value = r[12] || "大杯(L/700ml)";
        document.getElementById('count').value = r[13] || 1;
        
        // 重設折扣區域
        document.getElementById('discountType').value = 'none';
        document.getElementById('discountValue').value = '';
        document.getElementById('finalPriceShow').style.display = 'none';

        document.getElementById('formTitle').innerText = "✍️ 正在編輯紀錄";
        document.getElementById('submitBtn').innerText = "儲存修改資料";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
